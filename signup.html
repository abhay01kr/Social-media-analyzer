<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="form-box">
            <h1>Create Your Account</h1>

            <input type="text" placeholder="Full Name" name="name" required><br><br>
            <input type="email" placeholder="Email Address" name="email" required><br><br>
            <input type="password" placeholder="Password" name="password" required><br><br>
            <input type="password" placeholder="Confirm Password" name="confirm_password" required><br><br>

            <button onclick="showSuccess()">
    Create Account
</button>

<p id="successMsg" style="display:none; color:lime; font-size:20px; margin-top:15px;">
    ✅ Account Created Successfully!
</p>

<p>
    Already have an account?
    <a href="login.html">Login</a>
</p>

</div>
</div>

<script>
function showSuccess() {
    document.getElementById("successMsg").style.display = "block";

    setTimeout(function () {
        window.location.href = "login.html";
    }, 2000);
}
</script>

</body>
</html>
