<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="form-box">
            <h1>Create Your Account</h1>

            <input type="text" placeholder="Full Name" name="name" required><br><br>
            <input type="email" placeholder="Email Address" name="email" required><br><br>
            <input type="password" placeholder="Password" name="password" required><br><br>
            <input type="password" placeholder="Confirm Password" name="confirm_password" required><br><br>

            <button>Create Account</button>

            <p>Already have an account?
                <a href="login.html">Login</a>
            </p>
        </div>
    </div>
</body>
