<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scheduled Monitoring Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <!-- LEFT SIDEBAR -->
  <div class="sidebar">
    <div class="logo">14</div>
    <div class="nav-item active">🏠</div>
    <div class="nav-item">👤</div>
    <div class="nav-item">📊</div>
    <div class="nav-item">☁️</div>
    <div class="nav-item">⚙️</div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="container">
    <div class="header">
      <h1>Scheduled Monitoring Dashboard</h1>
      <div class="header-right">
        <span>🔔</span>
        <img src="profile.jpg" class="profile-pic" alt="profile">
      </div>
    </div>

    <div class="tabs">
      <button class="tab">Control</button>
      <button class="tab active">Alerts</button>
      <button class="btn-create">+ Create Monitor</button>
    </div>

    <!-- CARD 1 -->
    <div class="card">
      <div class="card-top">
        <h2>Profile Checks</h2>
        <a href="#">View all</a>
      </div>
      <div class="check-row">
        <div class="icon-box">E</div>
        <div class="check-info">
          <h3>Profile Data Check</h3>
          <p>Profile Analyze</p>
        </div>
        <span class="status ok">● Yes</span>
        <span class="status config">Configured</span>
        <span>...</span>
      </div>
    </div>

    <!-- CARD 2 -->
    <div class="card">
      <div class="card-top">
        <h2>Video Video Checks</h2>
        <a href="#">View all</a>
      </div>
      <div class="check-row">
        <div class="icon-box">E</div>
        <div class="check-info">
          <h3>Profile Data Check</h3>
          <p>Profile Checks</p>
        </div>
        <span class="status ok">● Yes</span>
        <span class="status config">Configured</span>
        <span>...</span>
      </div>
      <div class="check-row">
        <div class="icon-box">E</div>
        <div class="check-info">
          <h3>Video Video Check</h3>
          <p>Video Checks</p>
        </div>
        <span class="status ok">● Yes</span>
        <span class="status config">Configured</span>
        <span>...</span>
      </div>
