<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyze Profile</title>

    <link rel="stylesheet" href="profileanalyzer.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <div class="profile-page">

        <a href="dashboard.html" class="back-link"
            style="text-decoration: none; color: #2563eb; display: inline-flex; align-items: center; gap: 8px; margin-bottom: 25px; font-weight: 600; font-family: Arial, sans-serif;">
            <i class="fa-solid fa-arrow-left"></i> Back to Dashboard
        </a>

        <h1>Analyze Social Media Profile</h1>

        <p class="subtitle">
            Enter the profile URL to detect fake profiles.
        </p>

        <label for="url">Profile URL</label>

        <input id="url" type="url" placeholder="https://instagram.com/username">

        <h2>Select Platform</h2>

        <div class="platforms">

            <div class="platform">
                <i class="fa-brands fa-instagram"></i>
                <span>Instagram</span>
            </div>

            <div class="platform">
                <i class="fa-brands fa-facebook"></i>
                <span>Facebook</span>
            </div>

            <div class="platform">
                <i class="fa-brands fa-x-twitter"></i>
                <span>X</span>
            </div>

            <div class="platform">
                <i class="fa-brands fa-tiktok"></i>
                <span>TikTok</span>
            </div>

            <div class="platform">
                <i class="fa-brands fa-linkedin"></i>
                <span>LinkedIn</span>
            </div>

        </div>

        <h2>What We Analyze</h2>

        <ul class="analysis-list">
            <li><i class="fa-solid fa-check"></i> Profile Consistency</li>
            <li><i class="fa-solid fa-check"></i> Image Authenticity</li>
            <li><i class="fa-solid fa-check"></i> Followers Quality</li>
            <li><i class="fa-solid fa-check"></i> AI Generated Content</li>
        </ul>


    </div>

</body>

</html>
