<!DOCTYPE html>
<html>
<head>
    <title>Arbon AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
    <h2>Arbon AI</h2>
    <button onclick="showPage('dashboard')">Dashboard</button>
    <button onclick="showPage('video')">Video Analyzer</button>
    <button onclick="showPage('profile')">Profile Analyzer</button>
    <button onclick="showPage('viewer')">Viewer Analyzer</button>
</div>

<div class="main">

<div id="dashboard" class="page">
    <h1>Dashboard</h1>
    <p>Welcome to Arbon AI</p>
</div>

<div id="video" class="page">
    <h1>Video Analyzer</h1>
    <input type="file">
    <button>Analyze Video</button>
</div>

<div id="profile" class="page">
    <h1>Profile Analyzer</h1>
    <input placeholder="Followers">
    <input placeholder="Following">
    <button>Analyze Profile</button>
</div>

<div id="viewer" class="page">
    <h1>Viewer Analyzer</h1>
    <input type="file">
    <button>Analyze Viewers</button>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
